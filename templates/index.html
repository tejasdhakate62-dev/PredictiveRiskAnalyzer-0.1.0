<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analyzer Pro | Corporate Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrM7ZB-wBeujDvQKW0hbf-Ne_12vMRdTY",
            authDomain: "predective-project-risk-analyz.firebaseapp.com",
            projectId: "predective-project-risk-analyz",
            storageBucket: "predective-project-risk-analyz.firebasestorage.app",
            messagingSenderId: "873812909340",
            appId: "1:873812909340:web:8fd98d3765df736041eed9",
            measurementId: "G-QK0V825MZ9"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>

    <style>
        :root {
            --bg-deep: #0f172a; --card-bg: #1e293b; --accent-cyan: #22d3ee;
            --accent-gold: #fbbf24; --accent-green: #10b981; --text-main: #f8fafc;
            --text-dim: #94a3b8; --input-bg: #0f172a;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-deep);
            color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .dashboard-container {
            width: 95%; max-width: 1250px; display: grid; grid-template-columns: 320px 1fr 280px;
            gap: 20px; background: var(--card-bg); border-radius: 28px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.05);
        }

        .panel { background: rgba(15, 23, 42, 0.4); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
        h2 { color: var(--accent-cyan); margin: 0 0 20px 0; font-size: 1.4rem; }
        h3 { color: var(--accent-cyan); font-size: 0.65rem; text-transform: uppercase; margin: 20px 0 10px 0; border-left: 3px solid var(--accent-cyan); padding-left: 10px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        
        input, select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155;
            background: var(--input-bg); color: white; box-sizing: border-box; font-family: inherit;
        }

        .btn-predict {
            width: 100%; padding: 14px; background: var(--accent-cyan); color: #083344;
            border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase;
        }

        .risk-badge { font-size: 3.5rem; font-weight: 900; color: var(--accent-gold); margin: 10px 0; }
        .action-btns { display: flex; gap: 10px; margin-top: 20px; position: relative; }
        .btn-action { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }

        .csv-group { display: flex; flex: 1.5; position: relative; }
        .btn-main-csv { flex: 1; border-radius: 8px 0 0 8px; border-right: none; border-color: var(--accent-green); color: var(--accent-green); }
        .btn-arrow { max-width: 40px; border-radius: 0 8px 8px 0; border-color: var(--accent-green); color: var(--accent-green); }

        .dropdown-content { display: none; position: absolute; bottom: 55px; left: 0; width: 100%; background: #1e293b; border: 1px solid var(--accent-green); border-radius: 8px; z-index: 1000; }
        .dropdown-content div { padding: 10px; font-size: 0.75rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dropdown-content div:hover { background: rgba(16, 185, 129, 0.1); }

        .history-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; margin-bottom: 8px; border-radius: 8px; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="panel">
        <h2>Risk Terminal</h2>
        <form id="riskForm">
            <h3>Client Info</h3>
            <div class="input-group">
                <label>Company Name</label>
                <input type="text" id="companyName" name="companyName" required>
            </div>
            <div class="input-group">
                <label>Service Provided</label>
                <select id="serviceType" name="serviceType">
                    <option value="Website Development">Website Development</option>
                    <option value="App Development">App Development</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Digital Marketing">Digital Marketing</option>
                    <option value="Cloud Services">Cloud Services</option>
                </select>
            </div>
            <h3>Metrics</h3>
            <div class="input-group"><label>Budget (INR)</label><input type="number" name="budget" required></div>
            <div class="input-group"><label>Duration (Mo)</label><input type="number" name="duration" required></div>
            <div class="input-group"><label>Experience (Yr)</label><input type="number" name="experience" required></div>
            <div class="input-group"><label>Team Size</label><input type="number" name="teamSize" required></div>
            <div class="input-group"><label>Complexity (1-10)</label><input type="number" name="rework" required></div>
            <button type="submit" class="btn-predict">Run AI Engine</button>
        </form>
        <button onclick="auth.signOut()" id="logoutBtn" style="background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 20px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;">Logout System</button>
    </div>

    <div class="main-content">
        <div id="placeholder" class="panel" style="text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center;">
            <div style="font-size: 50px; opacity: 0.2;">📊</div>
            <p style="color: var(--text-dim);">Ready for Analysis</p>
        </div>

        <div id="resultGrid" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="panel" style="text-align: center;">
                    <label>AI Risk Score</label>
                    <div class="risk-badge" id="scoreDisplay">0.0</div>
                    <p id="riskLevel" style="font-weight: 800;"></p>
                </div>
                <div class="panel">
                    <label>Summary</label>
                    <p id="summaryText" style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.5;"></p>
                </div>
            </div>
            <div class="panel" style="margin-top: 20px; height: 300px;"><canvas id="analysisChart"></canvas></div>
            <div class="action-btns">
                <button class="btn-action" onclick="downloadPDF()">Export PDF</button>
                <div class="csv-group">
                    <button class="btn-action btn-main-csv" onclick="downloadCSV('master')">Download Master CSV</button>
                    <button class="btn-action btn-arrow" onclick="toggleCSV()">▼</button>
                    <div id="csvMenu" class="dropdown-content">
                        <div onclick="downloadCSV('single')">Download Last Result</div>
                        <div onclick="localStorage.removeItem('master_records'); alert('Memory Cleared')">Reset Master</div>
                    </div>
                </div>
                <button class="btn-action" onclick="location.reload()">Clear</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <label style="margin-bottom: 15px; display: block; font-weight: bold; color: var(--accent-cyan);">Cloud History</label>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let analysisChart;
    function toggleCSV() { const menu = document.getElementById('csvMenu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }

    function saveToCloud(score, data) {
        const user = auth.currentUser;
        if (user) {
            db.collection("reports").add({
                userId: user.uid,
                companyName: data.companyName,
                service: data.serviceType,
                risk_score: score,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => loadHistory());
        }
        let row = [`"${data.companyName}"`, `"${data.serviceType}"`, `"${data.budget}"`, `"${data.duration}"`, `"${data.experience}"`, `"${data.teamSize}"`, `"${data.rework}"`, `"${score}"`, `"${score > 7.5 ? 'CRITICAL':'STABLE'}"`].join(",") + "\n";
        localStorage.setItem('master_records', (localStorage.getItem('master_records') || "") + row);
    }

    function loadHistory() {
        const user = auth.currentUser; if (!user) return;
        db.collection("reports").where("userId", "==", user.uid).orderBy("timestamp", "desc").limit(8).get().then(snap => {
            const list = document.getElementById('historyList'); list.innerHTML = "";
            snap.forEach(doc => {
                const res = doc.data();
                let hColor = res.risk_score > 7.5 ? "#ef4444" : (res.risk_score > 4.5 ? "#fbbf24" : "#22d3ee");
                list.innerHTML += `<div class="history-item" style="border-left: 3px solid ${hColor};"><strong>${res.companyName}</strong><br><small>${res.service || 'N/A'}</small><br><small style="color:${hColor}">Score: ${res.risk_score}</small></div>`;
            });
        });
    }

    function downloadCSV(type) {
        const headers = "Company Name,Service,Budget,Duration,Experience,Team Size,Complexity,Score,Status\n";
        let data = type === 'master' ? localStorage.getItem('master_records') : "";
        if(type === 'single') {
            const fd = new FormData(document.getElementById('riskForm'));
            data = [`"${document.getElementById('companyName').value}"`, `"${fd.get('serviceType')}"`, `"${fd.get('budget')}"`, `"${fd.get('duration')}"`, `"${fd.get('experience')}"`, `"${fd.get('teamSize')}"`, `"${fd.get('rework')}"`, `"${document.getElementById('scoreDisplay').innerText}"`, `"${document.getElementById('riskLevel').innerText}"`].join(",") + "\n";
        }
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([headers + data], {type:'text/csv'})); a.download = "Risk_Report.csv"; a.click();
    }

    document.getElementById('riskForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(this).entries());
        try {
            const res = await fetch('/predict', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
            const result = await res.json(); renderResults(result.risk_score, payload);
        } catch(e) { renderResults((Math.random()*10).toFixed(1), payload); }
    });

    function renderResults(score, data) {
        document.getElementById('placeholder').style.display = 'none'; document.getElementById('resultGrid').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = score;
        let color = score > 7.5 ? "#ef4444" : (score > 4.5 ? "#fbbf24" : "#22d3ee");
        document.getElementById('scoreDisplay').style.color = color;
        document.getElementById('riskLevel').innerText = score > 7.5 ? "CRITICAL" : "STABLE";
        document.getElementById('riskLevel').style.color = color;
        updateChart(score, color); saveToCloud(score, data);
    }

    function updateChart(score, color) {
        const ctx = document.getElementById('analysisChart').getContext('2d');
        if(analysisChart) analysisChart.destroy();
        analysisChart = new Chart(ctx, { type:'bar', data:{ labels:['Complexity','Team','Budget','Timeline'], datasets:[{data:[score,5,score*0.8,6], backgroundColor:color}] }, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}} });
    }

    function downloadPDF() {
        const doc = new jspdf.jsPDF();
        doc.text(`Risk Analysis: ${document.getElementById('companyName').value}`, 10, 10);
        doc.text(`Service: ${document.getElementById('serviceType').value}`, 10, 20);
        doc.text(`Score: ${document.getElementById('scoreDisplay').innerText}`, 10, 30);
        doc.save("Report.pdf");
    }

    auth.onAuthStateChanged(user => { if(user) loadHistory(); else window.location.href="/"; });
</script>
</body>
</html>
