<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analyzer Pro | Login</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCrM7ZB-wBeujDvQKW0hbf-Ne_12vMRdTY",
            authDomain: "predective-project-risk-analyz.firebaseapp.com",
            projectId: "predective-project-risk-analyz",
            storageBucket: "predective-project-risk-analyz.firebasestorage.app",
            messagingSenderId: "873812909340",
            appId: "1:873812909340:web:8fd98d3765df736041eed9",
            measurementId: "G-QK0V825MZ9"
        };

        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
    </script>

    <style>
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --accent-cyan: #22d3ee;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--accent-cyan));
        }

        h1 { color: var(--accent-cyan); margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 0.9rem; margin-top: 8px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--accent-cyan); outline: none; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent-cyan);
            color: #083344;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--accent-cyan); text-decoration: underline; }

        .signup-highlight { color: var(--accent-cyan) !important; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon">🛡️</div>
        <h1>Welcome Back</h1>
        <p>Login to your Risk Analyzer Terminal</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Corporate Email</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Unlock System</button>
        </form>

        <div class="footer-links">
            <a href="/forgot-password">Forgot Password?</a>
            <span>New here? <a href="/signup" class="signup-highlight">Create an account</a></span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Getting values by ID (safer than index)
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            // UI Feedback
            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            // Firebase Auth
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Success: Redirect to Dashboard
                    window.location.href = "/dashboard";
                })
                .catch((error) => {
                    // Error: Reset Button and Alert
                    btn.innerText = "UNLOCK SYSTEM";
                    btn.disabled = false;
                    
                    let errorMsg = "Login Failed: ";
                    if (error.code === 'auth/user-not-found') errorMsg += "User not found.";
                    else if (error.code === 'auth/wrong-password') errorMsg += "Incorrect password.";
                    else errorMsg += error.message;
                    
                    alert(errorMsg);
                });
        });
    </script>
</body>
</html>
