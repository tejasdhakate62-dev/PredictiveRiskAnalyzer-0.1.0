<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analyzer Pro | Reset Password</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --accent-cyan: #22d3ee;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .forgot-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--accent-cyan);
        }

        h1 { color: var(--accent-cyan); margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        input {
            width: 100%;
            padding: 13px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent-cyan); outline: none; }

        .btn-reset {
            width: 100%;
            padding: 15px;
            background: var(--accent-cyan);
            color: #083344;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        #messageArea { display: none; margin-top: 20px; color: #10b981; font-weight: 600; }

        .back-to-login {
            margin-top: 25px;
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-to-login:hover { color: var(--accent-cyan); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="forgot-card">
        <div id="formContent">
            <div class="icon-box">🔓</div>
            <h1>Reset Password</h1>
            <p>Apna registered email address enter karein. Hum aapko password reset instructions bhejenge.</p>

            <form id="forgotForm">
                <div class="input-group">
                    <label>Corporate Email</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <button type="submit" class="btn-reset">Send Instructions</button>
            </form>
        </div>

        <div id="messageArea">
            <div style="font-size: 40px; margin-bottom: 10px;">📩</div>
            Link bhej diya gaya hai! <br> Apna inbox check karein.
        </div>

        <a href="/" class="back-to-login">← Back to Login</a>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Form ko hide karke message dikhayenge
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('messageArea').style.display = 'block';
        });
    </script>
</body>
</html>
